# .goreleaser.yaml
version: 2

project_name: tecla

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    ldflags:
      - -s -w -X 'github.com/gi4nks/tecla/cmd.Version={{.Version}}' -X 'github.com/gi4nks/tecla/cmd.GitCommit={{.ShortCommit}}' -X 'github.com/gi4nks/tecla/cmd.BuildDate={{.Date}}'

archives:
  - format: tar.gz
    # use zip for windows
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: gi4nks
    name: tecla
